<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Appointment Requested | Clinic Booking Mini</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --ink: #1f2933;
            --muted: #5f6b7a;
            --line: #d9dee7;
            --accent: #24736f;
            --accent-dark: #185653;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 42px 20px;
        }

        .panel {
            width: min(640px, 100%);
            margin: 0 auto;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 34px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.55;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        a {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
        }

        .primary {
            background: var(--accent);
            color: #ffffff;
        }

        .primary:hover,
        .primary:focus {
            background: var(--accent-dark);
        }

        .secondary {
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--ink);
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <h1>Appointment Request Received</h1>
            <p>
                Your appointment request was saved in the local MVP database. Clinic staff can review it in Django Admin.
            </p>
            <div class="actions">
                <a class="primary" href="{% url 'home' %}">Back to Overview</a>
                <a class="secondary" href="/admin/">Open Admin Dashboard</a>
            </div>
        </section>
    </main>
</body>
</html>
